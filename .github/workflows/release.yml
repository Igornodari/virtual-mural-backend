name: Release — Backend

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build, Validate & Publish Release
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: virtual_mural_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/virtual_mural_test
          NODE_ENV: test
          AWS_REGION: us-east-1
          COGNITO_USER_POOL_ID: us-east-1_test
          COGNITO_CLIENT_ID: test_client_id
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          STRIPE_SECRET_KEY: sk_test_placeholder

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "Backend ${{ github.ref_name }}"
          body: |
            ## Virtual Mural Backend — ${{ github.ref_name }}

            ### Checklist de Deploy
            - [ ] Variáveis de ambiente atualizadas no ECS/Railway
            - [ ] Migration do banco de dados executada (se houver)
            - [ ] Secrets do Stripe atualizadas (se necessário)

            ---
            *Release gerada automaticamente pelo GitHub Actions.*
