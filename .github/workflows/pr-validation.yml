name: PR Validation — Backend

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: virtual_mural_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check branch name follows git flow
        run: |
          BRANCH="${{ github.head_ref }}"
          # Branches principais do git flow (develop/master) são fontes válidas
          # pra PRs de promoção (ex: develop → master no release).
          if [[ "$BRANCH" =~ ^(develop|master|main)$ ]]; then
            echo "✅ Source branch '$BRANCH' is a main git flow branch — allowed."
            exit 0
          fi
          if [[ ! "$BRANCH" =~ ^(feature|bugfix|hotfix|release|chore)/.+ ]]; then
            echo "❌ Branch name '$BRANCH' does not follow git flow."
            echo "Expected: feature/*, bugfix/*, hotfix/*, release/*, chore/*"
            echo "         (or develop/master/main for release promotion PRs)"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/virtual_mural_test
          AWS_REGION: us-east-1
          COGNITO_USER_POOL_ID: us-east-1_test
          COGNITO_CLIENT_ID: test_client_id
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

      - name: Build check
        run: npm run build
